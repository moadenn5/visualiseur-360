<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mindfull — Expérience 360°</title>
<style>
  :root {
    --bg: #0d0d0f;
    --accent: #e8e6e1;
    --accent-dim: rgba(232, 230, 225, 0.55);
    --bar-bg: rgba(13, 13, 15, 0.72);
    --progress-bg: rgba(255, 255, 255, 0.18);
    --progress-fill: #e8e6e1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  #app { position: fixed; inset: 0; }
  #app canvas { display: block; cursor: grab; }
  #app canvas.dragging { cursor: grabbing; }

  /* ---------- Écran de démarrage ---------- */
  #startScreen {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, #1a1a1e 0%, var(--bg) 75%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 34px; z-index: 30;
    transition: opacity 0.8s ease;
  }
  #startScreen.hidden { opacity: 0; pointer-events: none; }
  #startScreen .playLabel {
    color: var(--accent);
    font-size: clamp(14px, 2vw, 18px);
    font-weight: 300;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    text-indent: 0.4em;
    margin-top: -14px;
  }
  #playBtn {
    width: 92px; height: 92px;
    border-radius: 50%;
    border: 1px solid rgba(232, 230, 225, 0.4);
    background: rgba(255, 255, 255, 0.04);
    color: var(--accent);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.35s, border-color 0.35s, transform 0.35s;
    backdrop-filter: blur(4px);
  }
  #playBtn:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(232, 230, 225, 0.85);
    transform: scale(1.06);
  }
  #playBtn svg { width: 30px; height: 30px; margin-left: 5px; }
  #startVrBtn {
    display: none;
    align-items: center; gap: 9px;
    background: transparent;
    border: 1px solid rgba(232, 230, 225, 0.25);
    color: var(--accent-dim);
    font-family: inherit;
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 11px 24px;
    border-radius: 30px;
    cursor: pointer;
    transition: color 0.3s, border-color 0.3s, background 0.3s;
  }
  #startVrBtn.supported { display: flex; }
  #startVrBtn:hover {
    color: var(--accent);
    border-color: rgba(232, 230, 225, 0.7);
    background: rgba(255, 255, 255, 0.05);
  }
  #startVrBtn svg { width: 20px; height: 20px; }
  #loadingMsg {
    color: var(--accent-dim);
    font-size: 12px;
    letter-spacing: 0.2em;
    display: none;
  }

  /* ---------- Indice de navigation ---------- */
  #hint {
    position: fixed;
    top: 7%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex; align-items: center; gap: 10px;
    color: rgba(232, 230, 225, 0.75);
    background: rgba(13, 13, 15, 0.45);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 40px;
    padding: 9px 20px;
    font-size: 12.5px;
    font-weight: 300;
    letter-spacing: 0.14em;
    backdrop-filter: blur(6px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s ease;
  }
  #hint.visible { opacity: 1; }
  #hint svg { width: 20px; height: 20px; animation: sway 2.6s ease-in-out infinite; }
  @keyframes sway {
    0%, 100% { transform: translateX(-4px); }
    50% { transform: translateX(4px); }
  }

  /* ---------- Barre de contrôle ---------- */
  #controls {
    position: fixed;
    left: 50%; bottom: 22px;
    transform: translateX(-50%);
    width: min(720px, calc(100% - 28px));
    z-index: 25;
    background: var(--bar-bg);
    border: 1px solid rgba(255, 255, 255, 0.07);
    border-radius: 14px;
    padding: 10px 16px 12px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.45s ease, transform 0.45s ease;
  }
  #controls.visible { opacity: 1; pointer-events: auto; }
  body.idle #app canvas { cursor: none; }

  /* Indicateur discret quand la barre est cachée */
  #ctrlIndicator {
    position: fixed;
    left: 50%; bottom: 10px;
    transform: translateX(-50%);
    z-index: 24;
    display: flex; align-items: center; gap: 6px;
    color: rgba(232, 230, 225, 0.45);
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.12em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
    user-select: none;
  }
  #ctrlIndicator.visible { opacity: 1; pointer-events: auto; }
  #ctrlIndicator svg {
    width: 18px; height: 18px;
    animation: nudgeUp 2.2s ease-in-out infinite;
  }
  #ctrlIndicator .txt {
    display: none;
    background: rgba(13, 13, 15, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 30px;
    padding: 6px 14px;
    backdrop-filter: blur(6px);
  }
  #ctrlIndicator.withText .txt { display: inline; }
  @keyframes nudgeUp {
    0%, 100% { transform: translateY(2px); opacity: 0.55; }
    50% { transform: translateY(-2px); opacity: 1; }
  }

  #progressWrap {
    position: relative;
    height: 18px;
    display: flex; align-items: center;
    cursor: pointer;
  }
  #progressTrack {
    position: relative;
    width: 100%; height: 4px;
    border-radius: 3px;
    background: var(--progress-bg);
    overflow: hidden;
    transition: height 0.2s;
  }
  #progressWrap:hover #progressTrack { height: 6px; }
  #seekTooltip {
    position: absolute;
    bottom: 22px;
    transform: translateX(-50%);
    background: rgba(13, 13, 15, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: var(--accent);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
    padding: 3px 8px;
    border-radius: 6px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  #progressWrap:hover #seekTooltip, #seekTooltip.forced { opacity: 1; }
  #buffered {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 0%;
    background: rgba(255, 255, 255, 0.14);
  }
  #progressFill {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 0%;
    background: var(--progress-fill);
  }
  #controlRow {
    display: flex; align-items: center; gap: 6px;
    margin-top: 4px;
  }
  .ctrlBtn {
    background: none; border: none;
    color: var(--accent);
    width: 38px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    border-radius: 8px;
    opacity: 0.85;
    transition: opacity 0.2s, background 0.2s;
  }
  .ctrlBtn:hover { opacity: 1; background: rgba(255, 255, 255, 0.08); }
  .ctrlBtn svg { width: 19px; height: 19px; fill: currentColor; }
  #timeDisplay {
    color: var(--accent-dim);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
    margin-left: 6px;
    user-select: none;
  }
  .spacer { flex: 1; }

  /* Bouton VR (visible uniquement si WebXR est supporté, ex. Meta Quest) */
  #vrBtn {
    display: none;
    align-items: center;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(232, 230, 225, 0.3);
    color: var(--accent);
    font-family: inherit;
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.08em;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s, border-color 0.2s;
  }
  #vrBtn:hover { background: rgba(255, 255, 255, 0.12); border-color: rgba(232, 230, 225, 0.7); }
  body.started #vrBtn.supported { display: flex; }

  @media (max-width: 480px) {
    #controls { bottom: 12px; padding: 8px 12px 10px; }
    #timeDisplay { font-size: 11px; }
    .ctrlBtn { width: 34px; }
    #hint { font-size: 11.5px; padding: 8px 16px; }
  }
</style>
</head>
<body>

<div id="app"></div>

<video id="video360" src="https://github.com/moadenn5/visualiseur-360/releases/download/v1/v1.mp4" preload="metadata" playsinline webkit-playsinline crossorigin="anonymous" style="display:none"></video>

<!-- Écran de démarrage -->
<div id="startScreen">
  <button id="playBtn" aria-label="Lancer la vidéo">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
  </button>
  <div class="playLabel">Play</div>
  <button id="startVrBtn" aria-label="Entrer directement en VR">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.5 6h-17C2.67 6 2 6.67 2 7.5v7c0 .83.67 1.5 1.5 1.5h4.06c.57 0 1.09-.32 1.34-.83l1.19-2.38c.37-.75 1.45-.75 1.82 0l1.19 2.38c.25.51.77.83 1.34.83h5.06c.83 0 1.5-.67 1.5-1.5v-7c0-.83-.67-1.5-1.5-1.5z"/></svg>
    Entrer en VR
  </button>

</div>

<!-- Indice de navigation -->
<div id="hint">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M9 11.5V5.8a1.8 1.8 0 0 1 3.6 0v5.2l3.8.9c1 .25 1.6 1.2 1.4 2.2l-.7 3.6a2.5 2.5 0 0 1-2.45 2H11a3 3 0 0 1-2.2-.96L5.2 14.9a1.4 1.4 0 0 1 2-1.96L9 14.5"/>
    <path d="M4.5 5.5 3 4m0 0v2.5M3 4h2.5M14.5 3.5 16 2m0 0v2.5M16 2h-2.5" stroke-width="1.2"/>
  </svg>
  <span>Glissez pour regarder autour</span>
</div>

<!-- Indicateur discret (barre cachée) -->
<div id="ctrlIndicator">
  <span class="txt">Approchez le curseur du bas de l'écran pour les contrôles</span>
  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7.4 15.4 12 10.8l4.6 4.6L18 14l-6-6-6 6z"/></svg>
</div>

<!-- Barre de contrôle -->
<div id="controls">
  <div id="progressWrap" aria-label="Barre de progression">
    <div id="seekTooltip">0:00</div>

      <div id="buffered"></div>

  <div id="controlRow">
    <button class="ctrlBtn" id="btnPlay" aria-label="Lecture / Pause">
      <svg id="iconPlay" viewBox="0 0 24 24" style="display:none"><path d="M8 5v14l11-7z"/></svg>
      <svg id="iconPause" viewBox="0 0 24 24"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
    </button>
    <button class="ctrlBtn" id="btnRestart" aria-label="Redémarrer la vidéo" title="Redémarrer">
      <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
    </button>
    <button class="ctrlBtn" id="btnMute" aria-label="Son">
      <svg id="iconVol" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05A4.5 4.5 0 0 0 16.5 12zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      <svg id="iconMuted" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.8 8.8 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z"/></svg>
    </button>
    <span id="timeDisplay">0:00 / 0:00</span>
    <span class="spacer"></span>
    <button id="vrBtn" aria-label="Mode réalité virtuelle">Entrer en VR</button>
    <button class="ctrlBtn" id="btnFs" aria-label="Plein écran">
      <svg id="iconFsOn" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      <svg id="iconFsOff" viewBox="0 0 24 24" style="display:none"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
    </button>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

/* ================= Éléments DOM ================= */
const app          = document.getElementById('app');
const video        = document.getElementById('video360');
const startScreen  = document.getElementById('startScreen');
const playBtn      = document.getElementById('playBtn');
const loadingMsg   = document.getElementById('loadingMsg');
const hint         = document.getElementById('hint');
const controls     = document.getElementById('controls');
const btnPlay      = document.getElementById('btnPlay');
const iconPlay     = document.getElementById('iconPlay');
const iconPause    = document.getElementById('iconPause');
const btnMute      = document.getElementById('btnMute');
const iconVol      = document.getElementById('iconVol');
const iconMuted    = document.getElementById('iconMuted');
const btnFs        = document.getElementById('btnFs');
const iconFsOn     = document.getElementById('iconFsOn');
const iconFsOff    = document.getElementById('iconFsOff');
const timeDisplay  = document.getElementById('timeDisplay');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');
const bufferedBar  = document.getElementById('buffered');

/* ================= Scène three.js ================= */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1100);
camera.position.set(0, 0, 0.01);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
renderer.xr.setReferenceSpaceType('local');
app.appendChild(renderer.domElement);

const texture = new THREE.VideoTexture(video);
texture.colorSpace = THREE.SRGBColorSpace;
texture.minFilter = THREE.LinearFilter;
texture.magFilter = THREE.LinearFilter;

const geometry = new THREE.SphereGeometry(500, 64, 48);
geometry.scale(-1, 1, 1); // inverser pour voir l'intérieur
const material = new THREE.MeshBasicMaterial({ map: texture });
const sphere = new THREE.Mesh(geometry, material);
scene.add(sphere);

/* ================= Navigation (souris / tactile / clavier) ================= */
let lon = 0, lat = 0;           // orientation cible
let curLon = 0, curLat = 0;     // orientation lissée
let isDragging = false;
let dragStartX = 0, dragStartY = 0;
let dragStartLon = 0, dragStartLat = 0;
let targetFov = 75;

const FOV_MIN = 35, FOV_MAX = 100;
const keys = {};

function onPointerDown(x, y) {
  isDragging = true;
  dragStartX = x; dragStartY = y;
  dragStartLon = lon; dragStartLat = lat;
  renderer.domElement.classList.add('dragging');
}
function onPointerMove(x, y) {
  if (!isDragging) return;
  const scale = 0.115 * (camera.fov / 75);
  lon = dragStartLon + (dragStartX - x) * scale;
  lat = dragStartLat + (y - dragStartY) * scale;
  lat = Math.max(-85, Math.min(85, lat));
}
function onPointerUp() {
  isDragging = false;
  renderer.domElement.classList.remove('dragging');
}

// Souris
renderer.domElement.addEventListener('mousedown', e => { e.preventDefault(); onPointerDown(e.clientX, e.clientY); });
window.addEventListener('mousemove', e => onPointerMove(e.clientX, e.clientY));
window.addEventListener('mouseup', onPointerUp);

// Molette (zoom)
renderer.domElement.addEventListener('wheel', e => {
  e.preventDefault();
  targetFov = Math.max(FOV_MIN, Math.min(FOV_MAX, targetFov + e.deltaY * 0.05));
}, { passive: false });

// Tactile (glisse + pincement)
let pinchDist = 0;
renderer.domElement.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    onPointerDown(e.touches[0].clientX, e.touches[0].clientY);
  } else if (e.touches.length === 2) {
    isDragging = false;
    pinchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });
renderer.domElement.addEventListener('touchmove', e => {
  if (e.touches.length === 1) {
    onPointerMove(e.touches[0].clientX, e.touches[0].clientY);
  } else if (e.touches.length === 2) {
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    targetFov = Math.max(FOV_MIN, Math.min(FOV_MAX, targetFov + (pinchDist - d) * 0.25));
    pinchDist = d;
  }
  e.preventDefault();
}, { passive: false });
renderer.domElement.addEventListener('touchend', onPointerUp);

// Clavier
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  if (e.key === 'm' || e.key === 'M') toggleMute();
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  wakeControls();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

function applyKeys() {
  const speed = 1.15 * (camera.fov / 75);
  if (keys['ArrowLeft'])  lon -= speed;
  if (keys['ArrowRight']) lon += speed;
  if (keys['ArrowUp'])    lat = Math.min(85, lat + speed);
  if (keys['ArrowDown'])  lat = Math.max(-85, lat - speed);
}

/* ================= Lecture ================= */
let started = false;

playBtn.addEventListener('click', () => {
  loadingMsg.style.display = 'block';
  video.play().then(() => {
    started = true;
    document.body.classList.add('started');
    startScreen.classList.add('hidden');
    updatePlayIcon();
    showHint();
    wakeControls();
  }).catch(() => {
    loadingMsg.textContent = 'Impossible de lancer la vidéo. Réessayez.';
  });
});

function togglePlay() {
  if (!started) return;
  if (video.paused) video.play(); else video.pause();
}
btnPlay.addEventListener('click', togglePlay);
renderer.domElement.addEventListener('dblclick', togglePlay);

video.addEventListener('play', updatePlayIcon);
video.addEventListener('pause', updatePlayIcon);
function updatePlayIcon() {
  iconPlay.style.display  = video.paused ? '' : 'none';
  iconPause.style.display = video.paused ? 'none' : '';
}

/* ================= Son ================= */
function toggleMute() {
  video.muted = !video.muted;
  iconVol.style.display   = video.muted ? 'none' : '';
  iconMuted.style.display = video.muted ? '' : 'none';
}
btnMute.addEventListener('click', toggleMute);

/* ================= Plein écran ================= */
function toggleFullscreen() {
  const el = document.documentElement;
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  }
}
btnFs.addEventListener('click', toggleFullscreen);
document.addEventListener('fullscreenchange', updateFsIcon);
document.addEventListener('webkitfullscreenchange', updateFsIcon);
function updateFsIcon() {
  const fs = !!(document.fullscreenElement || document.webkitFullscreenElement);
  iconFsOn.style.display  = fs ? 'none' : '';
  iconFsOff.style.display = fs ? '' : 'none';
}

/* ================= Progression / temps ================= */
function fmt(t) {
  if (!isFinite(t)) return '0:00';
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}
function updateProgress() {
  const d = video.duration || 0;
  progressFill.style.width = d ? `${(video.currentTime / d) * 100}%` : '0%';
  timeDisplay.textContent = `${fmt(video.currentTime)} / ${fmt(d)}`;
  try {
    if (video.buffered.length && d) {
      bufferedBar.style.width = `${(video.buffered.end(video.buffered.length - 1) / d) * 100}%`;
    }
  } catch (err) { /* ignore */ }
}
video.addEventListener('timeupdate', updateProgress);
video.addEventListener('loadedmetadata', updateProgress);
video.addEventListener('progress', updateProgress);

// Seek (clic + glisse) avec info-bulle du temps visé
let seeking = false;
const seekTooltip = document.getElementById('seekTooltip');

function ratioFromEvent(e) {
  const rect = progressWrap.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  return { ratio: Math.max(0, Math.min(1, x / rect.width)), x, rect };
}
function updateTooltip(e) {
  const { ratio, x, rect } = ratioFromEvent(e);
  if (!video.duration) return;
  seekTooltip.textContent = fmt(ratio * video.duration);
  seekTooltip.style.left = `${Math.max(24, Math.min(rect.width - 24, x))}px`;
}
function seekFromEvent(e) {
  const { ratio } = ratioFromEvent(e);
  if (video.duration) video.currentTime = ratio * video.duration;
  updateTooltip(e);
  updateProgress();
}
progressWrap.addEventListener('mousemove', updateTooltip);
progressWrap.addEventListener('mousedown', e => { seeking = true; seekFromEvent(e); });
window.addEventListener('mousemove', e => { if (seeking) seekFromEvent(e); });
window.addEventListener('mouseup', () => { seeking = false; });
progressWrap.addEventListener('touchstart', e => {
  seeking = true;
  seekTooltip.classList.add('forced');
  seekFromEvent(e);
}, { passive: true });
progressWrap.addEventListener('touchmove', e => { if (seeking) seekFromEvent(e); }, { passive: true });
progressWrap.addEventListener('touchend', () => {
  seeking = false;
  seekTooltip.classList.remove('forced');
});

/* ================= Redémarrer ================= */
document.getElementById('btnRestart').addEventListener('click', () => {
  video.currentTime = 0;
  if (started) video.play();
  updateProgress();
});

/* ================= Affichage / masquage des contrôles ================= */
// La barre s'affiche quelques secondes puis disparaît. Elle réapparaît
// quand le curseur s'approche du bas de l'écran (ou au toucher sur mobile).
const ctrlIndicator = document.getElementById('ctrlIndicator');
let hideTimer = null;
let firstHideDone = false;

function hideControls() {
  controls.classList.remove('visible');
  document.body.classList.add('idle');
  ctrlIndicator.classList.add('visible');
  if (!firstHideDone) {
    firstHideDone = true;
    ctrlIndicator.classList.add('withText');
    setTimeout(() => ctrlIndicator.classList.remove('withText'), 5000);
  }
}
function wakeControls() {
  if (!started) return;
  controls.classList.add('visible');
  document.body.classList.remove('idle');
  ctrlIndicator.classList.remove('visible');
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => {
    if (!video.paused && !seeking) hideControls();
  }, 1000);
}
// Réapparition uniquement à l'approche du bas de l'écran
window.addEventListener('mousemove', e => {
  if (e.clientY > window.innerHeight * 0.72) wakeControls();
});
window.addEventListener('touchstart', wakeControls, { passive: true });
ctrlIndicator.addEventListener('mouseenter', wakeControls);
controls.addEventListener('mouseenter', () => clearTimeout(hideTimer));
controls.addEventListener('mouseleave', wakeControls);
video.addEventListener('pause', wakeControls);

/* ================= Indice "glissez pour regarder" ================= */
function showHint() {
  hint.classList.add('visible');
  setTimeout(() => hint.classList.remove('visible'), 15000);
}

/* ================= Redimensionnement ================= */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ================= HUD VR (retour visuel des manettes) ================= */
const hudCanvas = document.createElement('canvas');
hudCanvas.width = hudCanvas.height = 256;
const hudCtx = hudCanvas.getContext('2d');
const hudTexture = new THREE.CanvasTexture(hudCanvas);
const hudMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(0.25, 0.25),
  new THREE.MeshBasicMaterial({ map: hudTexture, transparent: true, depthTest: false })
);
hudMesh.renderOrder = 999;
hudMesh.position.set(0, -0.25, -1.3);
hudMesh.visible = false;
camera.add(hudMesh);
scene.add(camera);

let hudTimer = null;
function showHud(symbol) {
  const c = hudCtx;
  c.clearRect(0, 0, 256, 256);
  c.fillStyle = 'rgba(13, 13, 15, 0.6)';
  c.beginPath(); c.arc(128, 128, 110, 0, Math.PI * 2); c.fill();
  c.fillStyle = '#e8e6e1';
  c.strokeStyle = '#e8e6e1';
  if (symbol === 'pause') {
    c.fillRect(92, 78, 26, 100);
    c.fillRect(138, 78, 26, 100);
  } else if (symbol === 'play') {
    c.beginPath(); c.moveTo(100, 73); c.lineTo(100, 183); c.lineTo(185, 128); c.closePath(); c.fill();
  } else { // redémarrage
    c.lineWidth = 16;
    c.beginPath(); c.arc(128, 128, 55, -0.4, Math.PI * 1.6); c.stroke();
    c.beginPath(); c.moveTo(150, 45); c.lineTo(192, 72); c.lineTo(146, 96); c.closePath(); c.fill();
  }
  hudTexture.needsUpdate = true;
  hudMesh.visible = true;
  clearTimeout(hudTimer);
  hudTimer = setTimeout(() => { hudMesh.visible = false; }, 1300);
}

/* ================= WebXR (Meta Quest, etc.) ================= */
const vrBtn = document.getElementById('vrBtn');
const startVrBtn = document.getElementById('startVrBtn');
let xrSession = null;

if (navigator.xr && navigator.xr.isSessionSupported) {
  navigator.xr.isSessionSupported('immersive-vr')
    .then(ok => {
      if (ok) {
        vrBtn.classList.add('supported');
        startVrBtn.classList.add('supported');
      }
    })
    .catch(() => {});
}

async function enterVR() {
  const session = await navigator.xr.requestSession('immersive-vr', {
    optionalFeatures: ['local-floor']
  });
  xrSession = session;
  // Manettes : gâchette = play/pause, grip = redémarrer
  session.addEventListener('select', () => {
    if (video.paused) { video.play(); showHud('play'); }
    else { video.pause(); showHud('pause'); }
  });
  session.addEventListener('squeeze', () => {
    video.currentTime = 0;
    video.play();
    showHud('restart');
  });
  session.addEventListener('end', () => {
    xrSession = null;
    vrBtn.textContent = 'Entrer en VR';
  });
  await renderer.xr.setSession(session);
  vrBtn.textContent = 'Quitter la VR';
}

// Bouton VR de la barre de contrôle
vrBtn.addEventListener('click', async () => {
  if (xrSession) { xrSession.end(); return; }
  try {
    await enterVR();
    if (started && video.paused) video.play();
  } catch (err) {
    vrBtn.textContent = 'VR indisponible';
    setTimeout(() => { vrBtn.textContent = 'Entrer en VR'; }, 3000);
  }
});

// Bouton VR de l'écran de démarrage : lance la vidéo + l'immersion en un clic
startVrBtn.addEventListener('click', async () => {
  if (xrSession) return;
  loadingMsg.style.display = 'block';
  const playPromise = video.play().catch(() => {});
  try {
    await enterVR();
    await playPromise;
    started = true;
    document.body.classList.add('started');
    startScreen.classList.add('hidden');
    updatePlayIcon();
    wakeControls();
  } catch (err) {
    loadingMsg.textContent = 'VR indisponible — utilisez le bouton Play.';
  }
});

/* ================= Boucle de rendu ================= */
function animate() {
  // En session VR, l'orientation vient du casque : on ne touche pas à la caméra.
  if (!renderer.xr.isPresenting) {
    applyKeys();

    // lissage de l'orientation et du zoom
    curLon += (lon - curLon) * 0.12;
    curLat += (lat - curLat) * 0.12;
    camera.fov += (targetFov - camera.fov) * 0.12;
    camera.updateProjectionMatrix();

    const phi = THREE.MathUtils.degToRad(90 - curLat);
    const theta = THREE.MathUtils.degToRad(curLon);
    camera.lookAt(
      500 * Math.sin(phi) * Math.cos(theta),
      500 * Math.cos(phi),
      500 * Math.sin(phi) * Math.sin(theta)
    );
  }

  renderer.render(scene, camera);
}
renderer.setAnimationLoop(animate); // requis pour WebXR
</script>
</body>
